site_name: BookShelf Documentation
theme:
  name: material
  features:
    - content.code.copy
    - content.tabs.link
    - content.tooltips

nav:
  - Home: index.md
  - TDD & Testing: tdd.md
  - Performance Optimization: optimization.md
  - Deployment : deployment.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets

